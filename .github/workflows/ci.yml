name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: typecheck + test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Setup Python 3.11+
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  pii-check:
    name: framework PII guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Scan SHIPPED framework files for maintainer PII leaks. Excludes
      # test/ (intentional fake fixtures: jane@acme.com, 555-867-5309
      # etc.) and src/pii/patterns.ts (self-documenting regex examples
      # in code comments like "123 Main St"). The harness's own
      # personal/ is gitignored and never enters CI — this guards the
      # framework code shipped to end users.
      - name: PII guard — framework files
        run: |
          set -e
          for d in src examples templates scripts docs; do
            if [ -d "$d" ]; then
              echo "Scanning $d/..."
              npx tsx -e "import('./src/pii/scanner.js').then(m => { const r = m.scanForPii({ root: '$d', exclude: ['node_modules/', '.git/', 'dist/', 'build/', 'venv/', '.vscode/', '.idea/', 'coverage/', 'pii/patterns.ts'] }); console.log(m.formatReport(r)); if (r.files_with_findings > 0) process.exit(1); })"
            fi
          done
